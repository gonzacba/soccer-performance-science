name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r 01_data_pipeline/requirements.txt

      - name: Run ingestion
        run: python 01_data_pipeline/ingest.py

      - name: Run validation
        run: python 01_data_pipeline/validate.py

      - name: Run tests
        run: pytest 01_data_pipeline/tests/ -v